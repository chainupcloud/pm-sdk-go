name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4

  codegen-drift:
    name: codegen drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      # 拉 chainupcloud/pm-cup2026:pm-v2 OpenAPI 后跑 oapi-codegen，
      # 再用 git diff --exit-code 校验 pkg/{clob,gamma}/generated.go 不漂移。
      # pm-cup2026 是 private repo，需仓库 secret PMCUP2026_READ_TOKEN（PAT, repo:read）。
      - name: run codegen
        env:
          GH_TOKEN: ${{ secrets.PMCUP2026_READ_TOKEN }}
        run: bash scripts/codegen.sh

      - name: ensure generated files unchanged
        run: git diff --exit-code pkg/clob/generated.go pkg/gamma/generated.go
